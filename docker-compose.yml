services:
  cisco-ise-mcp:
    build: .
    image: cisco-ise-mcp:local
    ports:
      - "8005:8005"
    env_file:
      - .env            # gitignored; copy from .env.example
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8005"
      MCP_TRANSPORT: streamable-http
    restart: unless-stopped
