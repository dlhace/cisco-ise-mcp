name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Type check
        run: mypy src || true   # advisory in v1
      - name: Test
        run: pytest -q

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure no real manifests / env committed
        run: |
          set -e
          ! git ls-files | grep -E '^(manifest|manifest-ro|manifest-rw)\.yml$'
          ! git ls-files | grep -E '(^|/)\.env$'
          echo "no secret-bearing files tracked"
